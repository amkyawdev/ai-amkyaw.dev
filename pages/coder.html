<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Generator - Amkyaw.Dev AI</title>
    <link rel="stylesheet" href="../css/fanda.css">
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/animation.css">

    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #0a0a0f; color: #fff; }
        
        .page-container { display: flex; min-height: 100vh; }
        
        /* Sidebar */
        .sidebar { width: 250px; background: #050508; border-right: 1px solid rgba(255,255,255,0.1); padding: 20px; position: fixed; top: 0; left: 0; bottom: 0; }
        .sidebar h3 { font-size: 0.75rem; color: #666; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 16px; }
        .sidebar-menu { list-style: none; padding: 0; margin: 0; }
        .sidebar-menu li { margin-bottom: 4px; }
        .sidebar-menu a { display: flex; align-items: center; gap: 12px; padding: 12px 16px; color: #a0a0a0; border-radius: 10px; transition: all 0.2s; text-decoration: none; }
        .sidebar-menu a:hover, .sidebar-menu a.active { background: rgba(255,255,255,0.05); color: #00d4ff; }
        .sidebar-menu svg { width: 20px; height: 20px; }
        
        /* Main */
        .main { flex: 1; margin-left: 250px; padding: 24px; }
        
        .page-header { margin-bottom: 24px; }
        .page-header h1 { font-size: 1.5rem; margin-bottom: 8px; }
        .page-header p { color: #a0a0a0; margin: 0; }
        
        /* Code Generator */
        .code-generator { max-width: 900px; }
        
        .input-section { margin-bottom: 24px; }
        .input-section label { display: block; font-size: 0.875rem; color: #a0a0a0; margin-bottom: 8px; }
        
        .code-textarea {
            width: 100%;
            min-height: 150px;
            padding: 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: #fff;
            font-family: 'Fira Code', monospace;
            font-size: 0.9rem;
            resize: vertical;
            outline: none;
        }
        .code-textarea:focus { border-color: #00d4ff; }
        
        .language-select {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: #fff;
            font-size: 1rem;
            outline: none;
            cursor: pointer;
        }
        
        .generate-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #00d4ff, #00ff88);
            border: none;
            border-radius: 12px;
            color: #0a0a0f;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .generate-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(0,212,255,0.3); }
        .generate-btn:disabled { opacity: 0.6; cursor: not-allowed; }
        
        /* Output */
        .output-section { margin-top: 24px; }
        .output-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .output-header h3 { font-size: 1rem; color: #a0a0a0; }
        
        .copy-btn {
            padding: 8px 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            color: #a0a0a0;
            font-size: 0.875rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .copy-btn:hover { background: rgba(0,212,255,0.1); border-color: rgba(0,212,255,0.3); color: #00d4ff; }
        
        .code-output {
            background: #0d0d12;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            overflow: hidden;
        }
        
        .code-output-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: #080810;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .code-lang { font-size: 0.75rem; color: #00d4ff; }
        
        .code-output pre {
            padding: 16px;
            margin: 0;
            font-family: 'Fira Code', monospace;
            font-size: 0.875rem;
            line-height: 1.6;
            overflow-x: auto;
            color: #e0e0e0;
        }
        
        /* Loading */
        .loading { display: none; align-items: center; gap: 12px; padding: 20px; color: #a0a0a0; }
        .loading.active { display: flex; }
        .spinner { width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.1); border-top-color: #00d4ff; border-radius: 50%; animation: spin 1s linear infinite; }
        
        @keyframes spin { to { transform: rotate(360deg); } }
        
        /* Error */
        .error-msg { padding: 16px; background: rgba(255,107,107,0.1); border: 1px solid rgba(255,107,107,0.3); border-radius: 12px; color: #ff6b6b; }
        
        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); }
            .main { margin-left: 0; }
        }
    </style>
</head>
<body>
    <div class="page-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <h3>AI Tools</h3>
            <ul class="sidebar-menu">
                <li><a href="chat.html"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z" /></svg>Chat</a></li>
                <li><a href="coder.html" class="active"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4" /></svg>Code</a></li>
                <li><a href="translate.html"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5h12M9 3v2m1.048 9.5A18.022 18.022 0 016.412 9m6.088 9h7M11 21l5-10 5 10M12.751 5C11.783 10.77 8.07 15.61 3 18.129" /></svg>Translate</a></li>
                <li><a href="summarize.html"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg>Summarize</a></li>
                <li><a href="roleplay.html"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z" /></svg>Roleplay</a></li>
                <li><a href="parameter.html"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" /></svg>API</a></li>
            </ul>
        </aside>

        <!-- Main Content -->
        <main class="main">
            <div class="page-header">
                <h1>Code Generator</h1>
                <p>Generate code in various programming languages</p>
            </div>
            
            <div class="code-generator">
                <div class="input-section">
                    <label>What code would you like to generate?</label>
                    <textarea id="code-input" class="code-textarea" placeholder="e.g., Create a login form with HTML and CSS"></textarea>
                </div>
                
                <div class="input-section">
                    <label>Programming Language (Optional)</label>
                    <select id="language-select" class="language-select">
                        <option value="">Auto-detect</option>
                        <option value="python">Python</option>
                        <option value="javascript">JavaScript</option>
                        <option value="html">HTML</option>
                        <option value="css">CSS</option>
                        <option value="java">Java</option>
                        <option value="cpp">C++</option>
                        <option value="csharp">C#</option>
                        <option value="sql">SQL</option>
                        <option value="php">PHP</option>
                        <option value="ruby">Ruby</option>
                        <option value="go">Go</option>
                        <option value="rust">Rust</option>
                        <option value="typescript">TypeScript</option>
                    </select>
                </div>
                
                <button class="generate-btn" onclick="generateCode()">Generate Code</button>
                
                <div class="output-section">
                    <div class="output-header">
                        <h3>Output</h3>
                        <button class="copy-btn" onclick="copyCode()">Copy Code</button>
                    </div>
                    
                    <div class="code-output">
                        <div class="code-output-header">
                            <span class="code-lang" id="output-lang">Output</span>
                        </div>
                        <pre id="code-result">Your generated code will appear here...</pre>
                    </div>
                    
                    <div class="loading" id="loading">
                        <div class="spinner"></div>
                        <span>Generating code...</span>
                    </div>
                    
                    <div class="error-msg" id="error-msg" style="display: none;"></div>
                </div>
            </div>
        </main>
    </div>

    <script src="../js/engine.js"></script>
    <script src="../js/api.js"></script>
    <script>
        async function generateCode() {
            const input = document.getElementById('code-input').value.trim();
            const language = document.getElementById('language-select').value;
            const resultEl = document.getElementById('code-result');
            const loadingEl = document.getElementById('loading');
            const errorEl = document.getElementById('error-msg');
            const langEl = document.getElementById('output-lang');
            
            if (!input) {
                showError('Please enter what code you want to generate');
                return;
            }
            
            // Show loading
            loadingEl.classList.add('active');
            errorEl.style.display = 'none';
            resultEl.textContent = '';
            
            try {
                const result = await generateCode(input);
                
                loadingEl.classList.remove('active');
                
                if (result.success) {
                    // Extract language from response if available
                    let code = result.response;
                    let lang = language || 'code';
                    
                    // Try to detect language
                    if (code.includes('```python')) lang = 'python';
                    else if (code.includes('```javascript') || code.includes('```js')) lang = 'javascript';
                    else if (code.includes('```html')) lang = 'html';
                    else if (code.includes('```css')) lang = 'css';
                    else if (code.includes('```java')) lang = 'java';
                    else if (code.includes('```cpp') || code.includes('```c++')) lang = 'cpp';
                    else if (code.includes('```sql')) lang = 'sql';
                    
                    // Remove markdown code blocks
                    code = code.replace(/```\w*\n?/g, '').trim();
                    
                    langEl.textContent = lang.toUpperCase();
                    resultEl.textContent = code;
                } else {
                    showError(result.error || 'Failed to generate code');
                }
            } catch (error) {
                loadingEl.classList.remove('active');
                showError('An error occurred: ' + error.message);
            }
        }
        
        function showError(message) {
            const errorEl = document.getElementById('error-msg');
            errorEl.textContent = message;
            errorEl.style.display = 'block';
        }
        
        function copyCode() {
            const code = document.getElementById('code-result').textContent;
            navigator.clipboard.writeText(code).then(() => {
                alert('Code copied to clipboard!');
            });
        }
    </script>
</body>
</html>

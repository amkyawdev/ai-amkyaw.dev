<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Translate - Amkyaw.Dev AI</title>
    <link rel="stylesheet" href="../css/fanda.css">
    <link rel="stylesheet" href="../css/main.css">
    <link rel="icon" href="../assets/logo.svg" type="image/svg+xml">
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #0a0a0f; color: #fff; }
        .page-container { display: flex; min-height: 100vh; }
        .sidebar { width: 250px; background: #050508; border-right: 1px solid rgba(255,255,255,0.1); padding: 20px; position: fixed; top: 0; left: 0; bottom: 0; }
        .sidebar h3 { font-size: 0.75rem; color: #666; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 16px; }
        .sidebar-menu { list-style: none; padding: 0; margin: 0; }
        .sidebar-menu a { display: flex; align-items: center; gap: 12px; padding: 12px 16px; color: #a0a0a0; border-radius: 10px; transition: all 0.2s; text-decoration: none; }
        .sidebar-menu a:hover, .sidebar-menu a.active { background: rgba(255,255,255,0.05); color: #00d4ff; }
        .sidebar-menu svg { width: 20px; height: 20px; }
        .main { flex: 1; margin-left: 250px; padding: 24px; }
        .page-header { margin-bottom: 24px; }
        .page-header h1 { font-size: 1.5rem; margin-bottom: 8px; }
        .page-header p { color: #a0a0a0; margin: 0; }
        .translator { max-width: 900px; }
        .translate-box { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
        .translate-section label { display: block; font-size: 0.875rem; color: #a0a0a0; margin-bottom: 8px; }
        .translate-section textarea { width: 100%; min-height: 200px; padding: 16px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: #fff; font-size: 1rem; resize: vertical; outline: none; }
        .translate-section textarea:focus { border-color: #00d4ff; }
        .swap-btn { display: flex; align-items: center; justify-content: center; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 50%; color: #a0a0a0; cursor: pointer; transition: all 0.2s; margin: 16px auto; width: 50px; height: 50px; }
        .swap-btn:hover { background: rgba(0,212,255,0.1); border-color: rgba(0,212,255,0.3); color: #00d4ff; }
        .lang-select { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
        .lang-select select { width: 100%; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #fff; font-size: 0.875rem; cursor: pointer; }
        .translate-btn { width: 100%; padding: 16px; background: linear-gradient(135deg, #00d4ff, #00ff88); border: none; border-radius: 12px; color: #0a0a0f; font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.3s; }
        .translate-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(0,212,255,0.3); }
        .loading { display: none; align-items: center; gap: 12px; padding: 20px; color: #a0a0a0; justify-content: center; }
        .loading.active { display: flex; }
        .spinner { width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.1); border-top-color: #00d4ff; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @media (max-width: 768px) { .sidebar { transform: translateX(-100%); } .main { margin-left: 0; } .translate-box { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="page-container">
        <aside class="sidebar">
            <h3>AI Tools</h3>
            <ul class="sidebar-menu">
                <li><a href="chat.html"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z" /></svg>Chat</a></li>
                <li><a href="coder.html"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4" /></svg>Code</a></li>
                <li><a href="translate.html" class="active"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5h12M9 3v2m1.048 9.5A18.022 18.022 0 016.412 9m6.088 9h7M11 21l5-10 5 10M12.751 5C11.783 10.77 8.07 15.61 3 18.129" /></svg>Translate</a></li>
                <li><a href="summarize.html"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg>Summarize</a></li>
                <li><a href="roleplay.html"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z" /></svg>Roleplay</a></li>
                <li><a href="parameter.html"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" /></svg>API</a></li>
            </ul>
        </aside>

        <main class="main">
            <div class="page-header">
                <h1>Language Translator</h1>
                <p>Translate text between languages</p>
            </div>
            
            <div class="translator">
                <div class="lang-select">
                    <select id="from-lang">
                        <option value="auto">Auto Detect</option>
                        <option value="en" selected>English</option>
                        <option value="mm">Myanmar (Burmese)</option>
                        <option value="ja">Japanese</option>
                        <option value="zh">Chinese</option>
                        <option value="ko">Korean</option>
                        <option value="th">Thai</option>
                        <option value="vi">Vietnamese</option>
                        <option value="es">Spanish</option>
                        <option value="fr">French</option>
                        <option value="de">German</option>
                        <option value="ru">Russian</option>
                        <option value="ar">Arabic</option>
                        <option value="hi">Hindi</option>
                    </select>
                    <select id="to-lang">
                        <option value="en">English</option>
                        <option value="mm" selected>Myanmar (Burmese)</option>
                        <option value="ja">Japanese</option>
                        <option value="zh">Chinese</option>
                        <option value="ko">Korean</option>
                        <option value="th">Thai</option>
                        <option value="vi">Vietnamese</option>
                        <option value="es">Spanish</option>
                        <option value="fr">French</option>
                        <option value="de">German</option>
                        <option value="ru">Russian</option>
                        <option value="ar">Arabic</option>
                        <option value="hi">Hindi</option>
                    </select>
                </div>
                
                <button class="swap-btn" onclick="swapLanguages()">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4" /></svg>
                </button>
                
                <div class="translate-box">
                    <div class="translate-section">
                        <label>Source Text</label>
                        <textarea id="source-text" placeholder="Enter text to translate..."></textarea>
                    </div>
                    <div class="translate-section">
                        <label>Translation</label>
                        <textarea id="target-text" placeholder="Translation will appear here..." readonly></textarea>
                    </div>
                </div>
                
                <button class="translate-btn" onclick="translateText()">Translate</button>
                
                <div class="loading" id="loading">
                    <div class="spinner"></div>
                    <span>Translating...</span>
                </div>
            </div>
        </main>
    </div>

    <script src="../js/engine.js"></script>
    <script src="../js/api.js"></script>
    <script>
        function swapLanguages() {
            const from = document.getElementById('from-lang');
            const to = document.getElementById('to-lang');
            const temp = from.value;
            from.value = to.value;
            to.value = temp;
        }
        
        async function translateText() {
            const source = document.getElementById('source-text').value.trim();
            const target = document.getElementById('target-text');
            const fromLang = document.getElementById('from-lang').value;
            const toLang = document.getElementById('to-lang').value;
            const loading = document.getElementById('loading');
            
            if (!source) {
                alert('Please enter text to translate');
                return;
            }
            
            loading.classList.add('active');
            target.value = '';
            
            try {
                const langMap = { 'mm': 'Burmese', 'ja': 'Japanese', 'zh': 'Chinese', 'ko': 'Korean', 'en': 'English' };
                const result = await translate(source, toLang);
                
                loading.classList.remove('active');
                
                if (result.success) {
                    target.value = result.response;
                } else {
                    target.value = 'Translation failed: ' + result.error;
                }
            } catch (error) {
                loading.classList.add('active');
                target.value = 'Error: ' + error.message;
            }
        }
    </script>
</body>
</html>

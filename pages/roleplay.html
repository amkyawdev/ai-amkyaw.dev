<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roleplay - Amkyaw.Dev AI</title>
    <link rel="stylesheet" href="../css/fanda.css">
    <link rel="stylesheet" href="../css/main.css">
    <link rel="icon" href="../assets/logo.svg" type="image/svg+xml">
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #0a0a0f; color: #fff; }
        .page-container { display: flex; min-height: 100vh; }
        .sidebar { width: 250px; background: #050508; border-right: 1px solid rgba(255,255,255,0.1); padding: 20px; position: fixed; top: 0; left: 0; bottom: 0; }
        .sidebar h3 { font-size: 0.75rem; color: #666; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 16px; }
        .sidebar-menu { list-style: none; padding: 0; margin: 0; }
        .sidebar-menu a { display: flex; align-items: center; gap: 12px; padding: 12px 16px; color: #a0a0a0; border-radius: 10px; transition: all 0.2s; text-decoration: none; }
        .sidebar-menu a:hover, .sidebar-menu a.active { background: rgba(255,255,255,0.05); color: #00d4ff; }
        .sidebar-menu svg { width: 20px; height: 20px; }
        .main { flex: 1; margin-left: 250px; padding: 24px; }
        .page-header { margin-bottom: 24px; }
        .page-header h1 { font-size: 1.5rem; margin-bottom: 8px; }
        .page-header p { color: #a0a0a0; margin: 0; }
        .roleplay-container { max-width: 900px; }
        .persona-select { margin-bottom: 24px; }
        .persona-select label { display: block; font-size: 0.875rem; color: #a0a0a0; margin-bottom: 8px; }
        .persona-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; }
        .persona-card { padding: 16px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; text-align: center; cursor: pointer; transition: all 0.2s; }
        .persona-card:hover { background: rgba(0,212,255,0.1); border-color: rgba(0,212,255,0.3); }
        .persona-card.selected { background: rgba(0,212,255,0.2); border-color: #00d4ff; }
        .persona-icon { font-size: 2rem; margin-bottom: 8px; }
        .persona-name { font-size: 0.875rem; color: #fff; }
        .chat-area { display: flex; flex-direction: column; height: 400px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; overflow: hidden; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 16px; }
        .message { display: flex; gap: 12px; margin-bottom: 16px; }
        .message.ai { align-self: flex-start; }
        .message.user { align-self: flex-end; flex-direction: row-reverse; }
        .msg-avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.25rem; }
        .message.ai .msg-avatar { background: linear-gradient(135deg, #00d4ff, #00ff88); }
        .message.user .msg-avatar { background: #1a1a2e; border: 1px solid rgba(255,255,255,0.1); }
        .msg-content { padding: 12px 16px; background: #1a1a2e; border-radius: 12px; max-width: 70%; }
        .message.user .msg-content { background: rgba(0,212,255,0.15); border: 1px solid rgba(0,212,255,0.3); }
        .msg-content p { margin: 0; color: #e0e0e0; font-size: 0.9rem; line-height: 1.5; }
        .chat-input-area { padding: 16px; border-top: 1px solid rgba(255,255,255,0.1); display: flex; gap: 12px; }
        .chat-input { flex: 1; padding: 12px 16px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #fff; font-size: 0.9rem; outline: none; }
        .chat-input:focus { border-color: #00d4ff; }
        .send-btn { padding: 12px 24px; background: linear-gradient(135deg, #00d4ff, #00ff88); border: none; border-radius: 8px; color: #0a0a0f; font-weight: 600; cursor: pointer; transition: all 0.3s; }
        .send-btn:hover { transform: scale(1.05); }
        .loading { display: none; align-items: center; gap: 12px; padding: 12px; color: #a0a0a0; }
        .loading.active { display: flex; }
        .spinner { width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.1); border-top-color: #00d4ff; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @media (max-width: 768px) { .sidebar { transform: translateX(-100%); } .main { margin-left: 0; } }
    </style>
</head>
<body>
    <div class="page-container">
        <aside class="sidebar">
            <h3>AI Tools</h3>
            <ul class="sidebar-menu">
                <li><a href="chat.html"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z" /></svg>Chat</a></li>
                <li><a href="coder.html"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4" /></svg>Code</a></li>
                <li><a href="translate.html"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5h12M9 3v2m1.048 9.5A18.022 18.022 0 016.412 9m6.088 9h7M11 21l5-10 5 10M12.751 5C11.783 10.77 8.07 15.61 3 18.129" /></svg>Translate</a></li>
                <li><a href="summarize.html"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg>Summarize</a></li>
                <li><a href="roleplay.html" class="active"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z" /></svg>Roleplay</a></li>
                <li><a href="parameter.html"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" /></svg>API</a></li>
            </ul>
        </aside>

        <main class="main">
            <div class="page-header">
                <h1>AI Roleplay</h1>
                <p>Chat with AI in different personalities</p>
            </div>
            
            <div class="roleplay-container">
                <div class="persona-select">
                    <label>Choose a Character</label>
                    <div class="persona-grid">
                        <div class="persona-card selected" data-persona="assistant" onclick="selectPersona(this)">
                            <div class="persona-icon">🤖</div>
                            <div class="persona-name">AI Assistant</div>
                        </div>
                        <div class="persona-card" data-persona="teacher" onclick="selectPersona(this)">
                            <div class="persona-icon">👨‍🏫</div>
                            <div class="persona-name">Teacher</div>
                        </div>
                        <div class="persona-card" data-persona="friend" onclick="selectPersona(this)">
                            <div class="persona-icon">👋</div>
                            <div class="persona-name">Friend</div>
                        </div>
                        <div class="persona-card" data-persona="anime" onclick="selectPersona(this)">
                            <div class="persona-icon">🎭</div>
                            <div class="persona-name">Anime Character</div>
                        </div>
                        <div class="persona-card" data-persona="doctor" onclick="selectPersona(this)">
                            <div class="persona-icon">👨‍⚕️</div>
                            <div class="persona-name">Doctor</div>
                        </div>
                        <div class="persona-card" data-persona="chef" onclick="selectPersona(this)">
                            <div class="persona-icon">👨‍🍳</div>
                            <div class="persona-name">Chef</div>
                        </div>
                    </div>
                </div>
                
                <div class="chat-area">
                    <div class="chat-messages" id="chat-messages">
                        <div class="message ai">
                            <div class="msg-avatar">🤖</div>
                            <div class="msg-content"><p>Hi! I'm ready to roleplay with you. Choose a character above and let's start!</p></div>
                        </div>
                    </div>
                    <div class="chat-input-area">
                        <input type="text" class="chat-input" id="roleplay-input" placeholder="Type your message..." onkeypress="handleEnter(event)">
                        <button class="send-btn" onclick="sendRoleplayMessage()">Send</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="../js/api.js"></script>
    <script>
        let currentPersona = 'assistant';
        
        function selectPersona(card) {
            document.querySelectorAll('.persona-card').forEach(c => c.classList.remove('selected'));
            card.classList.add('selected');
            currentPersona = card.dataset.persona;
            
            const messages = document.getElementById('chat-messages');
            messages.innerHTML = '';
            addMessage(`Hello! I'm ready to roleplay as ${getPersonaName(currentPersona)}. Let's start!`, 'ai');
        }
        
        function getPersonaName(persona) {
            const names = {
                'assistant': 'AI Assistant',
                'teacher': 'Teacher',
                'friend': 'Friendly Companion',
                'anime': 'Anime Character',
                'doctor': 'Doctor',
                'chef': 'Professional Chef'
            };
            return names[persona] || 'Assistant';
        }
        
        function addMessage(content, sender) {
            const messages = document.getElementById('chat-messages');
            const icon = sender === 'ai' ? getPersonaIcon() : '👤';
            
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${sender}`;
            msgDiv.innerHTML = `
                <div class="msg-avatar">${icon}</div>
                <div class="msg-content"><p>${content}</p></div>
            `;
            messages.appendChild(msgDiv);
            messages.scrollTop = messages.scrollHeight;
        }
        
        function getPersonaIcon() {
            const icons = {
                'assistant': '🤖',
                'teacher': '👨‍🏫',
                'friend': '👋',
                'anime': '🎭',
                'doctor': '👨‍⚕️',
                'chef': '👨‍🍳'
            };
            return icons[currentPersona] || '🤖';
        }
        
        function handleEnter(e) {
            if (e.key === 'Enter') sendRoleplayMessage();
        }
        
        async function sendRoleplayMessage() {
            const input = document.getElementById('roleplay-input');
            const message = input.value.trim();
            
            if (!message) return;
            
            addMessage(message, 'user');
            input.value = '';
            
            try {
                const result = await roleplay(message, currentPersona);
                
                if (result.success) {
                    addMessage(result.response, 'ai');
                } else {
                    addMessage('Sorry, I encountered an error. Please try again.', 'ai');
                }
            } catch (error) {
                addMessage('Error: ' + error.message, 'ai');
            }
        }
    </script>
</body>
</html>

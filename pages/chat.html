<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat - Amkyaw.Dev AI</title>
    <link rel="stylesheet" href="./css/fanda.css">
    <link rel="stylesheet" href="./css/main.css">
    <link rel="stylesheet" href="./css/animation.css">
    <link rel="icon" href="./assets/logo.svg" type="image/svg+xml">
    <style>
        /* Page specific styles */
        .chat-page {
            display: flex;
            flex-direction: column;
            height: 100vh;
            background: var(--bg-dark);
        }
        
        .chat-header {
            padding: 15px 24px;
            background: rgba(10, 10, 15, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .chat-header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .chat-header-left h1 {
            font-size: 1.25rem;
            font-weight: 600;
        }
        
        .mode-badge {
            padding: 4px 12px;
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.2), rgba(0, 255, 136, 0.1));
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: 20px;
            font-size: 0.75rem;
            color: var(--primary);
        }
        
        .chat-header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .api-status {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.75rem;
            color: var(--text-muted);
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--secondary);
        }
        
        .status-dot.offline {
            background: var(--accent);
        }
        
        .chat-body {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        
        .welcome-message {
            text-align: center;
            padding: 40px 20px;
            animation: fadeInUp 0.5s ease;
        }
        
        .welcome-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.2), rgba(0, 255, 136, 0.1));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .welcome-icon svg {
            width: 40px;
            height: 40px;
            color: var(--primary);
        }
        
        .welcome-message h2 {
            font-size: 1.5rem;
            margin-bottom: 8px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .welcome-message p {
            color: var(--text-secondary);
            max-width: 400px;
            margin: 0 auto;
        }
        
        .message {
            display: flex;
            gap: 12px;
            max-width: 80%;
            animation: fadeInUp 0.3s ease;
        }
        
        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }
        
        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        
        .message-avatar.ai {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
        }
        
        .message-avatar.user {
            background: var(--bg-lighter);
            border: 1px solid var(--glass-border);
        }
        
        .message-content {
            padding: 12px 18px;
            border-radius: 18px;
            background: var(--bg-light);
            border: 1px solid var(--glass-border);
        }
        
        .message.user .message-content {
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.15), rgba(0, 255, 136, 0.1));
            border-color: rgba(0, 212, 255, 0.3);
        }
        
        .message-content p {
            margin: 0;
            color: var(--text-primary);
            line-height: 1.5;
        }
        
        .message-content pre {
            background: var(--bg-darker);
            padding: 12px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 8px 0;
        }
        
        .message-content code {
            font-family: 'Fira Code', monospace;
            font-size: 0.875rem;
            color: var(--primary-light);
        }
        
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 12px 18px;
            background: var(--bg-light);
            border: 1px solid var(--glass-border);
            border-radius: 18px;
            width: fit-content;
        }
        
        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: var(--primary);
            border-radius: 50%;
            animation: bounce 1.4s ease-in-out infinite;
        }
        
        .typing-indicator span:nth-child(2) {
            animation-delay: 0.2s;
        }
        
        .typing-indicator span:nth-child(3) {
            animation-delay: 0.4s;
        }
        
        .chat-footer {
            padding: 16px 24px;
            background: rgba(10, 10, 15, 0.9);
            backdrop-filter: blur(10px);
            border-top: 1px solid var(--glass-border);
        }
        
        .chat-input-container {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }
        
        .chat-input-wrapper {
            flex: 1;
            position: relative;
        }
        
        .chat-input {
            width: 100%;
            padding: 14px 20px;
            padding-right: 50px;
            background: var(--bg-light);
            border: 1px solid var(--glass-border);
            border-radius: 25px;
            color: var(--text-primary);
            font-size: 1rem;
            outline: none;
            resize: none;
            min-height: 50px;
            max-height: 150px;
            transition: border-color 0.2s;
        }
        
        .chat-input:focus {
            border-color: var(--primary);
        }
        
        .chat-input::placeholder {
            color: var(--text-muted);
        }
        
        .chat-send-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            color: var(--bg-dark);
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .chat-send-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.4);
        }
        
        .chat-send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        .chat-send-btn svg {
            width: 20px;
            height: 20px;
        }
        
        .quick-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 12px;
            padding: 0 4px;
        }
        
        .quick-btn {
            padding: 6px 14px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            font-size: 0.75rem;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .quick-btn:hover {
            background: rgba(0, 212, 255, 0.1);
            border-color: rgba(0, 212, 255, 0.3);
            color: var(--primary);
        }
        
        /* Sidebar styles */
        .chat-with-sidebar {
            display: flex;
        }
        
        .sidebar {
            width: 250px;
            background: var(--bg-darker);
            border-right: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            position: fixed;
            top: 70px;
            left: 0;
            bottom: 0;
            z-index: 50;
        }
        
        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--glass-border);
        }
        
        .sidebar-header h3 {
            font-size: 0.875rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .sidebar-menu {
            list-style: none;
            padding: 12px;
            flex: 1;
            overflow-y: auto;
        }
        
        .sidebar-menu li {
            margin-bottom: 4px;
        }
        
        .sidebar-menu a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            color: var(--text-secondary);
            border-radius: 10px;
            transition: all 0.2s ease;
        }
        
        .sidebar-menu a:hover,
        .sidebar-menu a.active {
            background: var(--glass-bg);
            color: var(--primary);
        }
        
        .sidebar-menu svg {
            width: 20px;
            height: 20px;
        }
        
        .chat-main {
            flex: 1;
            margin-left: 250px;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        
        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
                transition: transform 0.3s ease;
            }
            
            .sidebar.active {
                transform: translateX(0);
            }
            
            .chat-main {
                margin-left: 0;
            }
            
            .message {
                max-width: 90%;
            }
        }
    </style>
</head>

    <script>
        // Chat state
        let currentMode = 'chat';
        let messages = [];
        
        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            requireAuth();
            checkApiStatus();
            loadChatHistory();
            
            // Auto-resize textarea
            const input = document.getElementById('chat-input');
            input.addEventListener('input', function() {
                this.style.height = 'auto';
                this.style.height = Math.min(this.scrollHeight, 150) + 'px';
            });
        });
        
        // Check API status
        async function checkApiStatus() {
            const statusDot = document.getElementById('status-dot');
            const statusText = document.getElementById('status-text');
            
            const status = await getApiStatus();
            
            if (status.online) {
                statusDot.classList.remove('offline');
                statusText.textContent = 'Online';
            } else {
                statusDot.classList.add('offline');
                statusText.textContent = 'Offline';
            }
        }
        
        // Handle key down
        function handleKeyDown(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }
        
        // Send message
        async function sendMessage() {
            const input = document.getElementById('chat-input');
            const message = input.value.trim();
            
            if (!message) return;
            
            // Clear input
            input.value = '';
            input.style.height = 'auto';
            
            // Hide welcome message
            document.getElementById('welcome-message').style.display = 'none';
            
            // Add user message
            addMessage(message, 'user');
            
            // Show typing indicator
            showTypingIndicator();
            
            try {
                // Send to API
                const result = await askAI(message, currentMode);
                
                // Remove typing indicator
                removeTypingIndicator();
                
                if (result.success) {
                    addMessage(result.response, 'ai');
                } else {
                    addMessage('Sorry, I encountered an error. Please try again.', 'ai');
                }
            } catch (error) {
                removeTypingIndicator();
                addMessage('Sorry, something went wrong. Please try again.', 'ai');
            }
            
            // Scroll to bottom
            scrollToBottom();
        }
        
        // Send quick message
        function sendQuickMessage(message) {
            document.getElementById('chat-input').value = message;
            sendMessage();
        }
        
        // Add message to chat
        function addMessage(content, sender) {
            const messagesContainer = document.getElementById('messages');
            
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;
            
            const avatarSvg = sender === 'ai' 
                ? '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z" /></svg>'
                : '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>';
            
            // Format content
            let formattedContent = content;
            if (content.includes('```')) {
                formattedContent = formatCodeBlocks(content);
            } else {
                formattedContent = `<p>${escapeHtml(content)}</p>`;
            }
            
            messageDiv.innerHTML = `
                <div class="message-avatar ${sender}">${avatarSvg}</div>
                <div class="message-content">${formattedContent}</div>
            `;
            
            messagesContainer.appendChild(messageDiv);
            
            // Save to history
            messages.push({ content, sender, timestamp: Date.now() });
            saveChatHistory();
        }
        
        // Format code blocks
        function formatCodeBlocks(text) {
            return text.replace(/```(\w+)?\n([\s\S]*?)```/g, (match, lang, code) => {
                return `<pre><code class="language-${lang || ''}">${escapeHtml(code.trim())}</code></pre>`;
            }).replace(/\n/g, '<br>');
        }
        
        // Show typing indicator
        function showTypingIndicator() {
            const messagesContainer = document.getElementById('messages');
            
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message ai';
            typingDiv.id = 'typing-indicator';
            typingDiv.innerHTML = `
                <div class="message-avatar ai">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z" />
                    </svg>
                </div>
                <div class="typing-indicator">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            `;
            
            messagesContainer.appendChild(typingDiv);
            scrollToBottom();
        }
        
        // Remove typing indicator
        function removeTypingIndicator() {
            const typingIndicator = document.getElementById('typing-indicator');
            if (typingIndicator) {
                typingIndicator.remove();
            }
        }
        
        // Scroll to bottom
        function scrollToBottom() {
            const chatBody = document.getElementById('chat-body');
            chatBody.scrollTop = chatBody.scrollHeight;
        }
        
        // Clear chat
        function clearChat() {
            if (confirm('Are you sure you want to clear all messages?')) {
                document.getElementById('messages').innerHTML = '';
                document.getElementById('welcome-message').style.display = 'block';
                messages = [];
                localStorage.removeItem('chat_history');
            }
        }
        
        // Save chat history
        function saveChatHistory() {
            localStorage.setItem('chat_history', JSON.stringify(messages));
        }
        
        // Load chat history
        function loadChatHistory() {
            const saved = localStorage.getItem('chat_history');
            if (saved) {
                messages = JSON.parse(saved);
                
                if (messages.length > 0) {
                    document.getElementById('welcome-message').style.display = 'none';
                    
                    messages.forEach(msg => {
                        addMessage(msg.content, msg.sender);
                    });
                }
            }
        }
    </script>
</body>
</html>

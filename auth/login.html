<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Amkyaw.Dev</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles/main.css">
  <style>
    body { font-family: 'Outfit', sans-serif; background: #030712; }
    .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
    .text-gradient { background: linear-gradient(135deg, #00d4ff, #00ff88); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .btn-gradient { background: linear-gradient(135deg, #00d4ff, #00ff88); }
    .btn-gradient:hover { box-shadow: 0 20px 40px -10px rgba(0, 212, 255, 0.4); transform: translateY(-2px); }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-md">
    <div class="glass rounded-2xl p-8">
      <!-- Logo -->
      <div class="text-center mb-8">
        <a href="../index.html" class="inline-flex items-center gap-3 mb-4">
          <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-cyan-400 to-green-400 flex items-center justify-center">
            <svg class="w-7 h-7 text-black" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
          </div>
        </a>
        <h1 class="text-2xl font-bold text-gradient">Welcome Back</h1>
        <p class="text-white/50 mt-2">Login to continue to Amkyaw.Dev</p>
      </div>

      <form id="login-form" class="space-y-4">
        <div>
          <label class="block text-sm text-white/70 mb-2">Email</label>
          <input type="email" id="email" class="w-full px-4 py-3 bg-white/5 border border-white/10 rounded-xl text-white placeholder-white/30 focus:border-cyan-400 outline-none transition-all" placeholder="you@example.com" required>
        </div>
        <div>
          <label class="block text-sm text-white/70 mb-2">Password</label>
          <input type="password" id="password" class="w-full px-4 py-3 bg-white/5 border border-white/10 rounded-xl text-white placeholder-white/30 focus:border-cyan-400 outline-none transition-all" placeholder="••••••••" required>
        </div>
        <div class="flex items-center justify-between text-sm">
          <label class="flex items-center gap-2 text-white/50 cursor-pointer">
            <input type="checkbox" class="w-4 h-4 accent-cyan-400 rounded">
            <span>Remember</span>
          </label>
          <a href="reset.html" class="text-cyan-400 hover:underline">Forgot password?</a>
        </div>
        <button type="submit" class="btn-gradient w-full py-3 rounded-xl font-semibold text-black">Sign In</button>
      </form>

      <div class="relative my-6">
        <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-white/10"></div></div>
        <div class="relative flex justify-center text-sm"><span class="px-4 bg-[#030712] text-white/30">or continue with</span></div>
      </div>

      <div class="grid grid-cols-2 gap-3">
        <button onclick="signInWithGoogle()" class="flex items-center justify-center gap-2 py-3 bg-white/5 border border-white/10 rounded-xl hover:bg-white/10 transition-all">
          <svg class="w-5 h-5" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          <span class="text-sm">Google</span>
        </button>
        <button onclick="signInWithFacebook()" class="flex items-center justify-center gap-2 py-3 bg-white/5 border border-white/10 rounded-xl hover:bg-white/10 transition-all">
          <svg class="w-5 h-5" viewBox="0 0 24 24" fill="#1877F2"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
          <span class="text-sm">Facebook</span>
        </button>
      </div>

      <p class="text-center text-white/50 mt-6">Don't have an account? <a href="register.html" class="text-cyan-400 font-medium hover:underline">Sign up</a></p>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
  <script>
    // Firebase Config - inline to avoid ES6 module issues
    const firebaseConfig = {
      apiKey: "AIzaSyAr7Hv2ApKtNTxF11MhT5cuWeg_Dgsh0TY",
      authDomain: "smart-burme-app.firebaseapp.com",
      projectId: "smart-burme-app",
      storageBucket: "smart-burme-app.appspot.com",
      messagingSenderId: "851502425686",
      appId: "1:851502425686:web:f29e0e1dfa84794b4abdf7"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    
    window.signInWithGoogle = async () => {
      const provider = new firebase.auth.GoogleAuthProvider();
      try {
        await auth.signInWithPopup(provider);
        window.location.href = '../pages/chat.html';
      } catch (e) { alert(e.message); }
    };
    
    window.signInWithFacebook = async () => {
      const provider = new firebase.auth.FacebookAuthProvider();
      try {
        await auth.signInWithPopup(provider);
        window.location.href = '../pages/chat.html';
      } catch (e) { alert(e.message); }
    };
    
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      try {
        await auth.signInWithEmailAndPassword(email, password);
        window.location.href = '../pages/chat.html';
      } catch (e) { alert(e.message); }
    });
  </script>
</body>
</html>
